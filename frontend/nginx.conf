# NGINX Configuration for React/Vite SPA
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Try resolving files natively, otherwise fallback to React Router index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you want Nginx to act as a reverse proxy for the backend
    # location /api/ {
    #     proxy_pass http://backend:5000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Disable Cache for HTML 
    location ~* \.html?$ {
        expires -1;
    }

    # Cache Static Assets (CSS/JS/Images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        expires max;
        access_log off;
    }
}
