version: '3.8'

services:
  # ----------------------------------------
  # Backend Express API Service
  # ----------------------------------------
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: freesiksha_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/freesiksha}
      # Add all other required Environment Variables here or via a .env file mapping
    networks:
      - mern_network
    depends_on:
      mongodb:
        condition: service_healthy

  # ----------------------------------------
  # Frontend React (Vite) + Nginx Service
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freesiksha_frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Host maps 3000 -> Container internal 80 (Nginx)
    depends_on:
      - backend
    networks:
      - mern_network

  # ----------------------------------------
  # Optional: Local MongoDB Service 
  # (Ignore if using MongoDB Atlas online)
  # ----------------------------------------
  mongodb:
    image: mongo:latest
    container_name: freesiksha_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern_network
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mern_network:
    driver: bridge

volumes:
  mongodb_data:
